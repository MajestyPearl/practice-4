<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article Preview Card</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<!-- update -->
<div class="card">

  <div class="card-image"></div>

  <div class="card-content">
    <h2 class="title">
      Змініть загальний вигляд і відчуття, додавши ці чудові деталі до меблів у вашому домі
    </h2>

    <p class="text">
       Ви коли-небудь були в кімнаті й відчували, що чогось бракує? Можливо, вона здавалася трохи порожньою та не затишною.
    </p>

    <div class="card-footer">

      <div class="author">
        <img src="/assets/images/avatar-femail.png" alt="avatar" class="avatar"/>
        <div>
          <p class="name">Петрікей Маргарита</p>
          <p class="date">28 Квітня 2026</p>
        </div>
      </div>

      <div class="share-wrapper">
        <button class="share-btn" id="shareBtn">⤴</button>

        <div class="share-menu" id="shareMenu">
          <span>SHARE</span>
          <a href="#">Facebook</a>
          <a href="#">Twitter</a>
          <a href="#">Pinterest</a>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
